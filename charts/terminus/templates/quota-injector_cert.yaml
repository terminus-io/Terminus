{{- if .Values.replaceEphemeralStorage.enabled -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: terminus-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: terminus-tls
spec:
  secretName: terminus-tls
  dnsNames:
  - terminus-quota-service.terminus.svc
  - terminus-quota-service.terminus.svc.cluster.local
  issuerRef:
    name: terminus-issuer
    kind: ClusterIssuer
{{- end -}}